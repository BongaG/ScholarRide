{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h3>🎓 Create Account</h3>
        <form method="POST" action="/register">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Student/Staff Number</label>
                <input type="text" name="student_number" class="form-control" placeholder="e.g. 22202467" required>
            </div>
            <div class="form-group">
                <label>DUT Email</label>
                <input type="email" name="email" class="form-control" placeholder="22202467@dut4life.ac.za" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="0812345678" required>
            </div>
            <div class="form-group">
                <label>I am registering as</label>
                <select name="role" class="form-select" required>
                    <option value="student">Student or Staff</option>
                    <option value="driver">Driver</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-1">Create Account</button>
        </form>
        <div class="auth-divider">Already registered? <a href="/login">Login</a></div>
    </div>
</div>
{% endblock %}
