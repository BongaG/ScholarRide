{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h4 style="color:#1B3A6B;" class="mb-4">➕ Post a Ride</h4>
            <form method="POST" action="/rides/post">
                <div class="form-group">
                    <label>Pickup Location</label>
                    <input type="text" name="origin" id="origin" class="form-control"
                           placeholder="e.g. Durban CBD or 39 Monmouth Road" required>
                </div>
                <div class="form-group">
                    <label>Destination</label>
                    <input type="text" name="destination" id="destination" class="form-control"
                           placeholder="e.g. DUT Steve Biko Campus or Ritson  Campus" required>
                </div>

                <!-- Map Preview -->
                <div class="form-group">
                    <label>Route Preview</label>
                    <div id="map" style="height:280px; border-radius:10px; z-index:0;"></div>
                    <small class="text-muted">Map updates as you type pickup and destination.</small>
                </div>

                <div class="row">
                    <div class="col-half">
                        <div class="form-group">
                            <label>Departure Date</label>
                            <input type="date" name="departure_date" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-half">
                        <div class="form-group">
                            <label>Departure Time</label>
                            <input type="time" name="departure_time" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
    <label>Vehicle Type</label>
    <select name="vehicle_type" id="vehicle_type" class="form-control" required onchange="updateSeats()">
        <option value="">Select vehicle type</option>
        <option value="Car">Car (up to 4 passengers)</option>
        <option value="Minibus">Minibus (up to 15 passengers)</option>
        <option value="Bus">Bus (up to 65 passengers)</option>
    </select>
</div>

<div class="form-group">
    <label>Vehicle Model</label>
    <input type="text" name="vehicle_model" class="form-control"
           placeholder="e.g. Toyota Corolla, VW Polo" required>
</div>

<div class="form-group">
    <label>Registration Number</label>
    <input type="text" name="registration_number" class="form-control"
           placeholder="e.g. ND 123 GP" required>
</div>

                <div class="form-group">
                    <label>Available Seats</label>
                    <input type="number" name="seats" class="form-control"
                           min="1" max="65" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Post Ride
                </button>
            </form>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.js"></script>

<style>
#map { height: 350px; width: 100%; border-radius: 10px; z-index: 0; }
</style>

<script>
const map = L.map('map', {
    zoomControl: true,
    fullscreenControl: true,
    fullscreenControlOptions: { position: 'topleft' }
}).setView([-29.85, 30.9], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
}).addTo(map);

setTimeout(() => { map.invalidateSize(); }, 300);

let originMarker = null;
let destMarker = null;
let routeLine = null;

const blueIcon = L.icon({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
});

const redIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
});

async function geocode(place) {
    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place + ' Durban South Africa')}&format=json&limit=1`
        );
        const data = await res.json();
        if (data.length > 0) {
            return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        }
    } catch(e) { console.log('Geocode error:', e); }
    return null;
}

async function getRoute(originCoords, destCoords) {
    try {
        const url = `https://router.project-osrm.org/route/v1/driving/${originCoords[1]},${originCoords[0]};${destCoords[1]},${destCoords[0]}?overview=full&geometries=geojson`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.routes && data.routes.length > 0) {
            return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        }
    } catch(e) { console.log('Route error:', e); }
    return null;
}

async function drawRoute() {
    const originVal = document.getElementById('origin').value.trim();
    const destVal = document.getElementById('destination').value.trim();

    if (originVal.length < 3 || destVal.length < 3) return;

    const originCoords = await geocode(originVal);
    const destCoords = await geocode(destVal);

    if (!originCoords || !destCoords) return;

    if (originMarker) map.removeLayer(originMarker);
    if (destMarker) map.removeLayer(destMarker);
    if (routeLine) map.removeLayer(routeLine);

    originMarker = L.marker(originCoords, { icon: blueIcon })
        .bindPopup('📍 Pickup: ' + originVal)
        .addTo(map)
        .openPopup();

    destMarker = L.marker(destCoords, { icon: redIcon })
        .bindPopup('🏁 Destination: ' + destVal)
        .addTo(map);

    const routeCoords = await getRoute(originCoords, destCoords);

    if (routeCoords) {
        routeLine = L.polyline(routeCoords, {
            color: '#1B3A6B',
            weight: 5,
            opacity: 0.8
        }).addTo(map);
    } else {
        routeLine = L.polyline([originCoords, destCoords], {
            color: '#1B3A6B',
            weight: 5,
            dashArray: '10'
        }).addTo(map);
    }

    const bounds = L.latLngBounds([originCoords, destCoords]);
    map.fitBounds(bounds, { padding: [60, 60] });
}

let timeout;
document.getElementById('origin').addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(drawRoute, 1000);
});
document.getElementById('destination').addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(drawRoute, 1000);
});

function updateSeats() {
    const type = document.getElementById('vehicle_type').value;
    const seats = document.getElementById('seats');
    if (type === 'Car') {
        seats.value = 4;
        seats.max = 4;
    } else if (type === 'Minibus') {
        seats.value = 15;
        seats.max = 15;
    } else if (type === 'Bus') {
        seats.value = 65;
        seats.max = 65;
    }
}
</script>


{% endblock %}
