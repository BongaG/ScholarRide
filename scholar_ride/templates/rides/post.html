{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h4 style="color:#1B3A6B;" class="mb-4">
                <i class="bi bi-plus-circle"></i> Post a Ride
            </h4>
            <form method="POST" action="/rides/post">
                <div class="mb-3">
                    <label class="form-label">Pickup Location</label>
                    <input type="text" name="origin" class="form-control" 
                           placeholder="e.g. Durban CBD, Musgrave" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Destination</label>
                    <input type="text" name="destination" class="form-control" 
                           placeholder="e.g. DUT Steve Biko Campus" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Departure Date</label>
                        <input type="date" name="departure_date" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Departure Time</label>
                        <input type="time" name="departure_time" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Available Seats</label>
                    <input type="number" name="seats" class="form-control" 
                           min="1" max="65" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle"></i> Post Ride
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
